<!DOCTYPE html>
<html>

<head>

<title>Cat vs Dog AI Classifier</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f8;
}

.card{
width:420px;
margin:40px auto;
background:white;
padding:20px;
border-radius:6px;
box-shadow:0px 0px 10px rgba(0,0,0,0.1);
}

.preview{
margin-top:15px;
text-align:center;
}

img{
max-width:100%;
border:2px dashed #4caf93;
padding:10px;
}

button{
width:100%;
padding:10px;
background:#2e7d62;
color:white;
border:none;
font-size:16px;
margin-top:15px;
cursor:pointer;
}

button:hover{
background:#1b5e4a;
}

.result{
margin-top:15px;
padding:10px;
background:#d9f3f7;
text-align:center;
}

.heatmap{
margin-top:15px;
text-align:center;
}

.chart{
margin-top:30px;
}

</style>

</head>

<body>

<div class="card">

<h2 style="text-align:center">Cat vs Dog AI Classifier</h2>

<form method="POST" enctype="multipart/form-data">

<label>Select image</label><br>

<input type="file" name="image" required><br><br>

<button type="submit">Classify</button>

</form>

{% if filename %}

<div class="preview">

<p><b>Uploaded Image:</b></p>

<img src="{{ url_for('uploaded_file', filename=filename) }}">

</div>

{% endif %}

{% if prediction %}

<div class="result">

<strong>Prediction:</strong> {{ prediction }} <br>

{% if confidence %}
<strong>Confidence:</strong> {{confidence}}%
{% endif %}

</div>

{% endif %}

{% if prediction %}

<div class="heatmap">

<h3>AI Attention (Grad-CAM)</h3>

<img src="/static/heatmap.jpg">

</div>

{% endif %}

<div class="chart">

<h3 style="text-align:center">Model Accuracy Comparison</h3>

<canvas id="accuracyChart"></canvas>

</div>

</div>

<script>

const ctx = document.getElementById('accuracyChart');

new Chart(ctx,{

type:'bar',

data:{
labels:['CNN','SVM','Random Forest','Logistic Regression'],

datasets:[{
label:'Accuracy %',
data:[94,89,86,82]
}]

}

});

</script>

</body>

</html>
